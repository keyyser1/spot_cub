<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Admin{% endblock %} — Studio Pilates</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sage: { 50:'#f4f7f4',100:'#e4ede4',200:'#c9dbc9',300:'#a3c0a3',400:'#7a9f7a',500:'#5c845c',600:'#486848',700:'#3a543a',800:'#2f432f',900:'#273827' },
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-56 bg-sage-800 text-sage-100 flex flex-col flex-shrink-0">
    <div class="px-5 py-5 border-b border-sage-700">
      <div class="text-white font-semibold text-sm">Studio Pilates</div>
      <div class="text-sage-400 text-xs">Administration</div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1 text-sm">
      <a href="/admin/dashboard"
         class="flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-sage-700 transition-colors {% if request.url.path == '/admin/dashboard' %}bg-sage-700 text-white{% endif %}">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Tableau de bord
      </a>
      <a href="/admin/cours"
         class="flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-sage-700 transition-colors {% if '/admin/cours' in request.url.path %}bg-sage-700 text-white{% endif %}">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Cours
      </a>
      <a href="/admin/sessions"
         class="flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-sage-700 transition-colors {% if '/admin/sessions' in request.url.path %}bg-sage-700 text-white{% endif %}">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Planning
      </a>
      <a href="/admin/clients"
         class="flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-sage-700 transition-colors {% if '/admin/clients' in request.url.path %}bg-sage-700 text-white{% endif %}">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        Clients
      </a>
    </nav>
    <div class="px-3 py-4 border-t border-sage-700 space-y-1 text-sm">
      <a href="/" class="flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-sage-700 transition-colors text-sage-300">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        Voir le site
      </a>
      <a href="/auth/logout" class="flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-sage-700 transition-colors text-sage-300">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Déconnexion
      </a>
    </div>
  </aside>

  <!-- Content -->
  <div class="flex-1 overflow-auto">
    <header class="bg-white border-b border-gray-200 px-8 py-4">
      <h1 class="text-lg font-semibold text-gray-800">{% block page_title %}{% endblock %}</h1>
    </header>
    <main class="px-8 py-6">{% block content %}{% endblock %}</main>
  </div>

</div>
</body>
</html>
