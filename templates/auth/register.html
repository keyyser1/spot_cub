{% extends "base.html" %}
{% block title %}Inscription — Studio Pilates{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-sage-100 rounded-xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-6 h-6 text-sage-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-gray-800">Créer mon compte</h1>
      <p class="text-gray-500 text-sm mt-1">Rejoignez le Studio Pilates</p>
    </div>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm mb-6">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/auth/register" class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Prénom</label>
          <input type="text" name="prenom" required autocomplete="given-name"
                 class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sage-400 focus:border-transparent transition"
                 placeholder="Marie"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Nom</label>
          <input type="text" name="nom" required autocomplete="family-name"
                 class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sage-400 focus:border-transparent transition"
                 placeholder="Dupont"/>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
        <input type="email" name="email" required autocomplete="email"
               class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sage-400 focus:border-transparent transition"
               placeholder="vous@exemple.fr"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Mot de passe</label>
        <input type="password" name="password" required minlength="8"
               class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sage-400 focus:border-transparent transition"
               placeholder="Minimum 8 caractères"/>
      </div>
      <button type="submit"
              class="w-full py-3 bg-sage-600 text-white font-semibold rounded-xl hover:bg-sage-700 transition-colors mt-2">
        Créer mon compte
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Déjà membre ?
      <a href="/auth/login" class="text-sage-600 font-medium hover:underline">Se connecter</a>
    </p>
  </div>
</div>
{% endblock %}
