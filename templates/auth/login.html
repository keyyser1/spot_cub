{% extends "base.html" %}
{% block title %}Connexion — Spot Club{% endblock %}

{% block content %}
<section class="relative min-h-[80vh] flex items-center justify-center px-4 py-16 overflow-hidden">
  <!-- Blobs -->
  <div class="absolute top-10 -left-20 w-96 h-96 bg-brand-200/50 rounded-full blur-3xl animate-blob"></div>
  <div class="absolute bottom-10 -right-20 w-96 h-96 bg-coral-200/50 rounded-full blur-3xl animate-blob delay-2s"></div>
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 w-72 h-72 bg-butter-200/40 rounded-full blur-3xl animate-blob delay-4s"></div>

  <div class="relative w-full max-w-md animate-fadeup">
    <!-- Logo + heading -->
    <div class="text-center mb-10">
      <a href="/" class="inline-flex items-center justify-center mb-6">
        <svg viewBox="0 0 48 48" fill="none" class="w-14 h-14 text-brand-700">
          <circle cx="22" cy="26" r="17" stroke="currentColor" stroke-width="2.6"/>
          <circle cx="36" cy="14" r="5" fill="#f04e1c"/>
        </svg>
      </a>
      <h1 class="font-display text-4xl font-medium text-ink-800">Bon retour</h1>
      <p class="text-ink-500 mt-2">Connectez-vous à votre espace Spot Club</p>
    </div>

    <div class="bg-white border border-ink-100 rounded-3xl p-8 shadow-soft">
      {% if error %}
      <div class="bg-coral-50 border border-coral-200 text-coral-700 rounded-2xl px-4 py-3 text-sm mb-6 flex items-center gap-2">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/auth/login" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-ink-600 uppercase tracking-wider mb-2">Email</label>
          <input type="email" name="email" required autocomplete="email"
                 class="w-full px-4 py-3 bg-cream-50 border border-ink-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-400 focus:bg-white focus:border-transparent transition placeholder:text-ink-300"
                 placeholder="vous@exemple.fr"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-ink-600 uppercase tracking-wider mb-2">Mot de passe</label>
          <input type="password" name="password" required autocomplete="current-password"
                 class="w-full px-4 py-3 bg-cream-50 border border-ink-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-400 focus:bg-white focus:border-transparent transition placeholder:text-ink-300"
                 placeholder="••••••••"/>
        </div>
        <button type="submit"
                class="w-full py-3.5 bg-gradient-to-tr from-brand-700 to-brand-500 text-white font-semibold rounded-2xl shadow-brand hover:shadow-pop hover:-translate-y-0.5 transition-all mt-2">
          Se connecter →
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-ink-500 mt-6">
      Pas encore de compte ?
      <a href="/auth/register" class="text-coral-500 font-semibold link-underline">Créer mon compte</a>
    </p>
  </div>
</section>
{% endblock %}
