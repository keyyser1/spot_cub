{% extends "base.html" %}
{% block title %}Connexion — Spot Club{% endblock %}

{% block content %}
<section class="min-h-[calc(100vh-5rem)] grid lg:grid-cols-2">

  <!-- Visuel -->
  <div class="hidden lg:block relative">
    <img src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=1400&q=80&auto=format&fit=crop"
         alt="Studio Pilates"
         class="absolute inset-0 w-full h-full object-cover"/>
    <div class="absolute inset-0 bg-gradient-to-br from-ink-900/80 via-ink-900/40 to-transparent"></div>
    <div class="absolute bottom-12 left-12 right-12 text-cream-50">
      <div class="text-xs uppercase tracking-super text-coral-300 font-semibold mb-4">— Spot Club</div>
      <p class="font-display text-3xl xl:text-4xl leading-tight max-w-md">
        Le Pilates, <span class="italic text-coral-400">autrement.</span>
      </p>
    </div>
  </div>

  <!-- Form -->
  <div class="flex items-center justify-center px-5 sm:px-8 py-16 lg:py-12 bg-cream-50">
    <div class="w-full max-w-md animate-fadeup">
      <div class="mb-10">
        <div class="eyebrow mb-4">— Connexion</div>
        <h1 class="headline-xl text-4xl md:text-5xl text-ink-900 mb-3">Bon retour.</h1>
        <p class="text-ink-500">Connectez-vous à votre espace personnel.</p>
      </div>

      {% if error %}
      <div class="bg-coral-50 border border-coral-200 text-coral-700 rounded-2xl px-4 py-3 text-sm mb-6 flex items-center gap-2.5">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/auth/login" class="space-y-5">
        <div>
          <label class="block text-xs font-bold text-ink-700 uppercase tracking-super mb-2">Email</label>
          <input type="email" name="email" required autocomplete="email"
                 class="w-full px-4 py-3.5 bg-white border border-ink-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-ink-900 focus:border-transparent transition placeholder:text-ink-300"
                 placeholder="vous@exemple.fr"/>
        </div>
        <div>
          <label class="block text-xs font-bold text-ink-700 uppercase tracking-super mb-2">Mot de passe</label>
          <input type="password" name="password" required autocomplete="current-password"
                 class="w-full px-4 py-3.5 bg-white border border-ink-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-ink-900 focus:border-transparent transition placeholder:text-ink-300"
                 placeholder="••••••••"/>
        </div>
        <button type="submit" class="btn btn-dark btn-lg btn-block mt-2">
          Se connecter
        </button>
      </form>

      <p class="text-center text-sm text-ink-500 mt-8">
        Pas encore de compte ?
        <a href="/auth/register" class="text-coral-500 font-semibold link-underline">Créer mon compte</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
